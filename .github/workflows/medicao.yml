name: Medição de Energia — VowpalWabbit

# Opção C: workflow dedicado que invoca o run_pipeline.sh existente (mesmo script
# validado localmente), rodando no self-hosted runner (tesla). Não substitui nem
# altera o vendor_build.yml / python_checks.yml originais.

on:
  workflow_dispatch:
    inputs:
      campaign:
        description: "validacao = apenas run 0 (smoke test) | completa = runs 1..10 + mediana"
        type: choice
        required: true
        default: validacao
        options:
          - validacao
          - completa

jobs:
  medicao:
    runs-on: [self-hosted, linux]
    env:
      # O contexto `env` do Actions nao expoe o HOME do processo do runner: a
      # interpolacao resolvia para string vazia e o upload-artifact nao achava nada.
      HOME_DIR: /home/maycon
    # build (~166s) + test (~30s) + train (~795s) + baseline 120s por run.
    # A campanha completa (10 runs + repouso de 120s entre runs) leva várias horas.
    timeout-minutes: 1200

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          submodules: false   # submodules já estão na imagem Docker

      - name: Permitir leitura dos contadores RAPL
        run: sudo /usr/local/bin/rapl-set-readable

      - name: Verificar disponibilidade do RAPL
        run: |
          if [ ! -d /sys/class/powercap/intel-rapl ]; then
            echo "❌ RAPL não disponível neste runner"
            exit 1
          fi
          echo "✅ Domínios RAPL disponíveis:"
          ls /sys/class/powercap/intel-rapl/

      - name: Verificar imagem Docker
        run: |
          if ! docker image inspect vowpal-wabbit-medicao &>/dev/null; then
            echo "❌ Imagem 'vowpal-wabbit-medicao' não encontrada no runner."
            echo "   Build manual na tesla antes de disparar este workflow:"
            echo "   cd ~/backup_repo/vowpal_wabbit && docker build --no-cache \\"
            echo "     -t vowpal-wabbit-medicao \\"
            echo "     -f ~/experimentos/medicao/repositorios/vowpal_wabbit/Dockerfile ."
            exit 1
          fi
          echo "✅ Imagem Docker encontrada."
          docker image inspect vowpal-wabbit-medicao --format '{{.Created}}'

      # --- MODO validacao: apenas run 0, resultado não conta para a mediana ---
      - name: Run de validação (run 0)
        if: ${{ inputs.campaign == 'validacao' }}
        run: |
          RESULTS_DIR="$HOME/experimentos/medicao/resultados/vowpal_wabbit/runs"
          bash "$HOME/experimentos/medicao/repositorios/vowpal_wabbit/run_pipeline.sh" 0
          # run 0 é smoke test: mover run_00.csv para fora de runs/ para não
          # entrar na agregação da mediana (aggregate.py globa runs/run_*.csv)
          mkdir -p "$RESULTS_DIR/validacao"
          if [ -f "$RESULTS_DIR/run_00.csv" ]; then
            mv -f "$RESULTS_DIR/run_00.csv" "$RESULTS_DIR/validacao/run_00.csv"
            echo "ℹ️  run_00.csv movido para runs/validacao/ (não conta para os resultados)"
          fi
          # Sanity check não bloqueante de user/sys (ver alertar_user_sys no modo completa)
          awk -F, '
            NR==1 { next }
            ($2=="build" || $2=="test" || $2=="train") && $7+0 > 0 {
              r = ($8 + $9) / $7
              if (r < 0.5)
                printf "::warning::[run 0] stage %s: (user+sys)/wall = %.4f < 0.5 (user=%ss sys=%ss wall=%ss) — captura de user/sys pode ter regredido para o host\n", $2, r, $8, $9, $7
            }
          ' "$RESULTS_DIR/validacao/run_00.csv"

      # --- MODO completa: 10 runs oficiais + mediana (com skip-if-exists) ---
      - name: Executar 10 runs de medição
        if: ${{ inputs.campaign == 'completa' }}
        run: |
          RESULTS_DIR="$HOME/experimentos/medicao/resultados/vowpal_wabbit/runs"
          PIPELINE="$HOME/experimentos/medicao/repositorios/vowpal_wabbit/run_pipeline.sh"
          # Garantir que nenhum run_00.csv de validação polua a mediana
          rm -f "$RESULTS_DIR/run_00.csv"

          # Valida run_NN.csv: 4 stages (build/test/train/total) presentes e colunas
          # críticas (energy_pkg_j, energy_cores_j, wall_time_s) não-vazias e > 0.
          # user_time_s/sys_time_s NÃO entram na validação (não usados na análise).
          validar_csv() {
            local csv="$1"
            [ -f "$csv" ] || return 1
            awk -F, '
              NR==1 { next }
              $2=="build"||$2=="test"||$2=="train"||$2=="total" {
                seen[$2]=1
                if ($3==""||$4==""||$7=="" || $3+0<=0 || $4+0<=0 || $7+0<=0) inval[$2]=1
              }
              END {
                split("build test train total", req, " ")
                for (i in req) {
                  s=req[i]
                  if (!(s in seen)) exit 1
                  if (s in inval)   exit 1
                }
                exit 0
              }
            ' "$csv"
          }

          # Sanity check NÃO bloqueante de user/sys (regressão detectada em 2026-07-10 no PL):
          # em stages CPU-bound (build/test/train — todos, neste estudo), (user+sys)/wall < 0.5
          # indica que user/sys mediram o cliente `docker run` no host, e não os processos
          # dentro do container (mecanismo TIMEFORMAT + /timing do run_pipeline.sh). Emite
          # ::warning:: e registra no step summary; não invalida a run — energia e wall não
          # dependem dessas colunas.
          alertar_user_sys() {
            local csv="$1" origem="$2"
            [ -f "$csv" ] || return 0
            awk -F, -v origem="$origem" '
              NR==1 { next }
              ($2=="build" || $2=="test" || $2=="train") && $7+0 > 0 {
                r = ($8 + $9) / $7
                if (r < 0.5)
                  printf "::warning::[%s] stage %s: (user+sys)/wall = %.4f < 0.5 (user=%ss sys=%ss wall=%ss) — captura de user/sys pode ter regredido para o host\n", origem, $2, r, $8, $9, $7
              }
            ' "$csv" | tee -a "$GITHUB_STEP_SUMMARY"
            return 0
          }

          # --- Warm-up descartado (convenção: 11 runs, mediana sobre os 10 válidos) ---
          # Roda incondicionalmente antes de qualquer sessão com runs pendentes — inclusive
          # retomadas após queda. Usa o run_pipeline.sh com número 0 e move o CSV para
          # runs/warmup/ (fora do glob run_*.csv do aggregate.py); sobrescreve o anterior,
          # pois é dado descartado por design. O rm -f run_00.csv acima também garante que
          # um warm-up interrompido nunca deixe resíduo dentro de runs/.
          PENDENTES=0
          for i in $(seq 1 10); do
            validar_csv "$RESULTS_DIR/run_$(printf '%02d' "$i").csv" || PENDENTES=$((PENDENTES+1))
          done
          if [ "$PENDENTES" -gt 0 ]; then
            echo "::group::Warm-up (descartado da análise)"
            echo "🔥 $PENDENTES run(s) pendente(s) — executando warm-up antes dos runs oficiais"
            mkdir -p "$RESULTS_DIR/warmup"
            bash "$PIPELINE" 0
            mv -f "$RESULTS_DIR/run_00.csv" "$RESULTS_DIR/warmup/run_warmup.csv"
            alertar_user_sys "$RESULTS_DIR/warmup/run_warmup.csv" "warm-up"
            {
              echo "## Warm-up executado e DESCARTADO (não entra na mediana)"
              echo "- $PENDENTES run(s) pendente(s) nesta sessão; CSV em \`runs/warmup/run_warmup.csv\` (sobrescrito a cada sessão)"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::endgroup::"
            echo "⏳ Repouso pós-warm-up (120s)..."
            sleep 120
          else
            echo "✅ Campanha já completa (10 runs válidas) — warm-up desnecessário"
            echo "## Warm-up pulado — campanha já estava completa" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "## Execução (modo completa) — skip-if-exists" >> "$GITHUB_STEP_SUMMARY"
          for i in $(seq 1 10); do
            NN=$(printf '%02d' "$i")
            CSV="$RESULTS_DIR/run_${NN}.csv"
            echo "::group::Run $i de 10"
            if validar_csv "$CSV"; then
              echo "✅ Run $NN já existe e é válida — pulando"
              echo "- Run $NN: já existe e é válida — **pulada**" >> "$GITHUB_STEP_SUMMARY"
              echo "::endgroup::"
              continue
            fi
            if [ -f "$CSV" ]; then
              echo "♻️  Run $NN incompleta/inválida — reexecutando (sobrescreve)"
              echo "- Run $NN: CSV inválido/incompleto — **reexecutada**" >> "$GITHUB_STEP_SUMMARY"
              rm -f "$CSV"   # script só grava header se o arquivo não existir; remove p/ sobrescrever limpo
            else
              echo "▶️  Run $NN ausente — executando"
              echo "- Run $NN: ausente — **executada**" >> "$GITHUB_STEP_SUMMARY"
            fi
            bash "$PIPELINE" "$i"
            alertar_user_sys "$CSV" "run $NN"
            echo "::endgroup::"
            if [ "$i" -lt 10 ]; then
              echo "⏳ Repouso entre runs (120s)..."
              sleep 120
            fi
          done

          # Varredura final: cobre também runs pré-existentes puladas pelo skip-if-exists,
          # para que nenhuma campanha feche em silêncio com user/sys inválidos.
          for i in $(seq 1 10); do
            NN=$(printf '%02d' "$i")
            alertar_user_sys "$RESULTS_DIR/run_${NN}.csv" "run $NN"
          done

      - name: Calcular medianas (após run 10)
        if: ${{ inputs.campaign == 'completa' }}
        run: |
          RESULTS_DIR="$HOME/experimentos/medicao/resultados/vowpal_wabbit/runs"
          SUMMARY="$HOME/experimentos/medicao/resultados/vowpal_wabbit/summary.csv"
          python3 "$HOME/experimentos/medicao/scripts/aggregate.py" "$RESULTS_DIR" "$SUMMARY"
          {
            echo ""
            echo "## Medianas (10 runs) — vowpal_wabbit"
            echo '```'
            cat "$SUMMARY"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # Docker --privileged grava arquivos como root no workspace; corrige o dono
      # via container descartável (evita depender de sudo com senha no runner).
      - name: Corrigir permissões do workspace
        if: always()
        run: |
          docker run --rm --privileged \
            -v "${{ github.workspace }}":/w \
            alpine chown -R "$(id -u):$(id -g)" /w || true

      - name: Upload dos resultados
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultados-vowpal-wabbit-${{ github.run_number }}
          # NOTA_FIDELIDADE.md é documento de consulta interna, local na tesla: fica
          # fora do artefato. A exclusão (!) vem depois do include; como só há um
          # include, a raiz do artefato continua resultados/vowpal_wabbit/ e a
          # estrutura interna não muda.
          path: |
            ${{ env.HOME_DIR }}/experimentos/medicao/resultados/vowpal_wabbit/
            !${{ env.HOME_DIR }}/experimentos/medicao/resultados/vowpal_wabbit/NOTA_FIDELIDADE.md
          retention-days: 90
